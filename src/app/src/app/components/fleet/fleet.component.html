<section class="fleet-section">
  <!-- Background decoration -->
  <div class="fleet-bg-deco">
    <div class="deco-circle deco-1"></div>
    <div class="deco-circle deco-2"></div>
  </div>

  <div class="container">
    <div class="section-header reveal" #revealEl>
      <span class="section-tag">Наш автопарк</span>
      <h2 class="section-title">Выберите свой автомобиль</h2>
      <div class="accent-line"></div>
      <p class="section-subtitle">
        Чистые, современные автомобили для любого случая и бюджета
      </p>
    </div>

    <div class="fleet-grid">
      <div class="fleet-card reveal"
           *ngFor="let car of cars; let i = index"
           [class]="'delay-' + (i + 1)"
           [class.fleet-card--featured]="car.featured"
           #revealEl>

        <!-- Featured badge -->
        <div class="featured-badge" *ngIf="car.featured">
          <i class="fas fa-fire"></i> Популярный выбор
        </div>

        <!-- Car image -->
        <div class="car-image-wrap">
          <img [src]="car.image"
               [alt]="car.name"
               class="car-image"
               loading="lazy">
          <div class="car-class-badge" [style.background]="car.gradient">
            {{ car.class }}
          </div>
        </div>

        <!-- Car info -->
        <div class="car-info">
          <div class="car-header">
            <div>
              <h3 class="car-name">{{ car.name }}</h3>
              <p class="car-model">{{ car.model }}</p>
            </div>
            <div class="car-price">
              <span class="price-from">от</span>
              <span class="price-value">{{ car.price }}</span>
            </div>
          </div>

          <div class="car-specs">
            <div class="spec-item" *ngFor="let spec of car.specs">
              <i [class]="spec.icon"></i>
              <span>{{ spec.text }}</span>
            </div>
          </div>

          <div class="car-features">
                <span class="car-feature" *ngFor="let feat of car.features">
                  <i class="fas fa-check"></i>
                  {{ feat }}
                </span>
          </div>

          <a href="https://wa.me/78620000000"
             target="_blank"
             class="btn btn-select"
             [class.btn-primary]="car.featured"
             [class.btn-outline]="!car.featured">
            <i class="fas fa-car"></i>
            Выбрать {{ car.class }}
          </a>
        </div>
      </div>
    </div>
  </div>
</section>

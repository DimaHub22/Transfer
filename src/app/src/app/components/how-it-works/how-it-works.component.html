<section class="how-section">
  <div class="container">
    <div class="section-header reveal" #revealEl>
      <span class="section-tag">Просто и удобно</span>
      <h2 class="section-title">Как это работает</h2>
      <div class="accent-line"></div>
      <p class="section-subtitle">
        Всего 4 простых шага — и вы уже едете с комфортом
      </p>
    </div>

    <div class="steps-wrap">
      <div class="steps-connector" aria-hidden="true"></div>

      <div class="steps-grid">
        <div class="step reveal"
             *ngFor="let step of steps; let i = index"
             [class]="'delay-' + (i + 1)"
             #revealEl>
          <div class="step-number-wrap">
            <div class="step-number">{{ step.number }}</div>
            <div class="step-icon" [style.background]="step.gradient">
              <i [class]="step.icon"></i>
            </div>
          </div>

          <div class="step-content">
            <h3>{{ step.title }}</h3>
            <p>{{ step.description }}</p>
            <div class="step-highlight" *ngIf="step.highlight">
              <i class="fas fa-check-circle"></i>
              {{ step.highlight }}
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom CTA -->
    <div class="how-cta reveal" #revealEl>
      <a href="https://wa.me/78620000000"
         target="_blank"
         class="btn btn-whatsapp btn-lg">
        <i class="fab fa-whatsapp"></i>
        Оставить заявку в WhatsApp
      </a>
      <a href="tel:+78620000000" class="btn btn-outline btn-lg">
        <i class="fas fa-phone"></i>
        +7 (862) 000-00-00
      </a>
    </div>
  </div>
</section>

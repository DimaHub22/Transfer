<header class="header" [class.scrolled]="isScrolled" [class.menu-open]="menuOpen">
  <div class="container">
    <nav class="nav">
      <!-- Logo -->
      <a href="#home" class="logo" (click)="closeMenu()">
        <div class="logo-icon">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <rect width="36" height="36" rx="10" fill="url(#logoGrad)"/>
            <path d="M8 22 L14 15 L18 19 L24 11 L28 16"
                  stroke="white" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="28" cy="16" r="2" fill="#d4af37"/>
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="36" y2="36">
                <stop offset="0%" stop-color="#1a365d"/>
                <stop offset="100%" stop-color="#2563eb"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-brand">Transfer</span>
          <span class="logo-city">СОЧИ</span>
        </div>
      </a>

      <!-- Desktop Menu -->
      <ul class="nav-menu">
        <li><a href="#features" (click)="smoothScroll($event, 'features')">Преимущества</a></li>
        <li><a href="#fleet" (click)="smoothScroll($event, 'fleet')">Автопарк</a></li>
        <li><a href="#prices" (click)="smoothScroll($event, 'prices')">Цены</a></li>
        <li ><a href="#reviews" (click)="smoothScroll($event, 'reviews')">Отзывы</a></li>
        <li><a href="#contacts" (click)="smoothScroll($event, 'contacts')">Контакты</a></li>
      </ul>
      <!-- Actions -->
      <div class="nav-actions">
        <a href="tel:+78620000000" class="nav-phone hide-mobile">
          <i class="fas fa-phone"></i>
          +7 (862) 000-00-00
        </a>
        <a href="#booking"
           class="btn btn-primary"
           (click)="smoothScroll($event, 'booking')">
          Забронировать
        </a>

        <!-- Burger -->
        <button class="burger"
                (click)="toggleMenu()"
                [class.active]="menuOpen"
                aria-label="Меню">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </nav>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="menuOpen">
    <ul>
      <li><a href="#features" (click)="smoothScroll($event, 'features')">Преимущества</a></li>
      <li><a href="#fleet" (click)="smoothScroll($event, 'fleet')">Автопарк</a></li>
      <li><a href="#prices" (click)="smoothScroll($event, 'prices')">Цены</a></li>
      <li *ngIf="isWideScreen"><a href="#reviews" (click)="smoothScroll($event, 'reviews')">Отзывы</a></li>
      <li><a href="#contacts" (click)="smoothScroll($event, 'contacts')">Контакты</a></li>
    </ul>
    <div class="mobile-menu-contacts">
      <a href="tel:+78620000000" class="btn btn-outline">
        <i class="fas fa-phone"></i> +7 (862) 000-00-00
      </a>
      <a href="https://wa.me/78620000000" target="_blank" class="btn btn-whatsapp">
        <i class="fab fa-whatsapp"></i> WhatsApp
      </a>
    </div>
  </div>
</header>

<!-- Overlay -->
<div class="menu-overlay"
     [class.visible]="menuOpen"
     (click)="closeMenu()"></div>

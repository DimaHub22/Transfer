<div class="preloader" [class.hidden]="!isLoading">
  <div class="preloader-inner">
    <div class="preloader-logo">
      <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
        <circle cx="30" cy="30" r="28" stroke="#d4af37" stroke-width="2" opacity="0.3"/>
        <circle cx="30" cy="30" r="28" stroke="#d4af37" stroke-width="2"
                stroke-dasharray="176" stroke-dashoffset="176"
                class="preloader-circle"/>
        <path d="M15 35 L22 28 L28 34 L35 22 L45 32"
              stroke="#d4af37" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"
              fill="none"/>
      </svg>
    </div>
    <div class="preloader-brand">
      <span class="brand-name">АвтоДжет</span>
      <span class="brand-city">Сочи</span>
    </div>
    <div class="preloader-bar">
      <div class="preloader-progress"></div>
    </div>
    <p class="preloader-text">Загрузка...</p>
  </div>
</div>

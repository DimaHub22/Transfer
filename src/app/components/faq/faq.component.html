<section class="faq-section">
  <div class="container">
    <div class="faq-wrap">
      <!-- Left column -->
      <div class="faq-left reveal reveal-left" #revealEl>
        <span class="section-tag">FAQ</span>
        <h2 class="section-title">Часто задаваемые вопросы</h2>
        <div class="accent-line" style="margin: 16px 0 24px;"></div>
        <p class="section-subtitle" style="margin: 0 0 32px;">
          Ответили на самые популярные вопросы, которые нам задают клиенты
        </p>

        <div class="faq-contacts">
          <p class="faq-contacts-title">Не нашли ответ?</p>
          <a href="https://wa.me/78620000000"
             target="_blank"
             class="btn btn-whatsapp">
<!--            <i class="fab fa-whatsapp"></i>-->
            <span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720">
            <path fill="#fff" d="M350.4,9.6C141.8,20.5,4.1,184.1,12.8,390.4c3.8,90.3,40.1,168,48.7,253.7,2.2,22.2-4.2,49.6,21.4,59.3,31.5,11.9,79.8-8.1,106.2-26.4,9-6.1,17.6-13.2,24.2-22,27.3,18.1,53.2,35.6,85.7,43.4,143.1,34.3,299.9-44.2,369.6-170.3C799.6,291.2,622.5-4.6,350.4,9.6h0ZM269.4,504c-11.3,8.8-22.2,20.8-34.7,27.7-18.1,9.7-23.7-.4-30.5-16.4-21.4-50.9-24-137.6-11.5-190.9,16.8-72.5,72.9-136.3,150-143.1,78-6.9,150.4,32.7,183.1,104.2,72.4,159.1-112.9,316.2-256.4,218.6h0Z"/>
          </svg>
          </span>
            Написать в MAX
          </a>
          <a href="tel:+78620000000" class="faq-phone">
            <i class="fas fa-phone"></i>
            +7 (920) 599-47-03
          </a>
        </div>

        <div class="faq-illustration">
          <img
            src="assets/car/wey_80_2.webp"
            alt="Трансфер в Сочи"
            loading="lazy">
          <div class="faq-img-badge">
            <i class="fas fa-headset"></i>
            <span>Поддержка 24/7</span>
          </div>
        </div>
      </div>

      <!-- Right column — accordion -->
      <div class="faq-right reveal reveal-right" #revealEl>
        <div class="accordion">
          <div class="accordion-item"
               *ngFor="let item of faqItems; let i = index"
               [class.open]="openIndex === i">
            <button class="accordion-header"
                    (click)="toggle(i)"
                    [attr.aria-expanded]="openIndex === i">
              <div class="accordion-icon-wrap">
                <i [class]="item.icon"></i>
              </div>
              <span class="accordion-question">{{ item.question }}</span>
              <div class="accordion-arrow">
                <i class="fas fa-chevron-down"></i>
              </div>
            </button>
            <div class="accordion-body" [style.maxHeight]="openIndex === i ? '500px' : '0'">
              <div class="accordion-content">
                <p>{{ item.answer }}</p>
                <div class="accordion-highlight" *ngIf="item.highlight">
                  <i class="fas fa-check-circle"></i>
                  {{ item.highlight }}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

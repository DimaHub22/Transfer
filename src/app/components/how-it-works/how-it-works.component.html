<section class="how-section">
  <div class="container">
    <div class="section-header reveal" #revealEl>
      <span class="section-tag">Просто и удобно</span>
      <h2 class="section-title">Как это работает</h2>
      <div class="accent-line"></div>
      <p class="section-subtitle">
        Всего 4 простых шага — и вы уже едете с комфортом
      </p>
    </div>

    <div class="steps-wrap">
      <div class="steps-connector" aria-hidden="true"></div>

      <div class="steps-grid">
        <div class="step reveal"
             *ngFor="let step of steps; let i = index"
             [class]="'delay-' + (i + 1)"
             #revealEl>
          <div class="step-number-wrap">
            <div class="step-number">{{ step.number }}</div>
            <div class="step-icon" [style.background]="step.gradient">
              <i [class]="step.icon"></i>
            </div>
          </div>

          <div class="step-content">
            <h3>{{ step.title }}</h3>
            <p>{{ step.description }}</p>
            <div class="step-highlight" *ngIf="step.highlight">
              <i class="fas fa-check-circle"></i>
              {{ step.highlight }}
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom CTA -->
    <div class="how-cta reveal" #revealEl>
      <a href="tel:+78620000000" class="btn btn-outline btn-lg">
        <i class="fas fa-phone"></i>
        +7 (862) 000-00-00
      </a>
      <a href="https://wa.me/78620000000"
         target="_blank"
         class="btn btn-whatsapp btn-lg">
<!--        <i class="fab fa-whatsapp"></i>-->
        <span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720">
            <path fill="#fff" d="M350.4,9.6C141.8,20.5,4.1,184.1,12.8,390.4c3.8,90.3,40.1,168,48.7,253.7,2.2,22.2-4.2,49.6,21.4,59.3,31.5,11.9,79.8-8.1,106.2-26.4,9-6.1,17.6-13.2,24.2-22,27.3,18.1,53.2,35.6,85.7,43.4,143.1,34.3,299.9-44.2,369.6-170.3C799.6,291.2,622.5-4.6,350.4,9.6h0ZM269.4,504c-11.3,8.8-22.2,20.8-34.7,27.7-18.1,9.7-23.7-.4-30.5-16.4-21.4-50.9-24-137.6-11.5-190.9,16.8-72.5,72.9-136.3,150-143.1,78-6.9,150.4,32.7,183.1,104.2,72.4,159.1-112.9,316.2-256.4,218.6h0Z"/>
          </svg>
          </span>
        Оставить заявку в MAX
      </a>

    </div>
  </div>
</section>

<section class="features-section">
  <div class="container"  id="features">
    <div class="section-header reveal" #revealEl>
      <span class="section-tag">Почему выбирают нас</span>
      <h2 class="section-title">Новый взгляд на качество и стиль <br>VIP трансфера</h2>
      <div class="accent-line"></div>
      <p class="section-subtitle">
        Мы делаем всё, чтобы ваша дорога была комфортной
        с первой до последней минуты
      </p>
    </div>

    <div class="features-grid">
      <div class="feature-card reveal"
           *ngFor="let feature of features; let i = index"
           [class]="'delay-' + (i + 1)"
           #revealEl>
        <div class="feature-icon" [style.background]="feature.gradient">
          <i [class]="feature.icon"></i>
        </div>
        <div class="feature-content">
          <h3>{{ feature.title }}</h3>
          <p>{{ feature.description }}</p>
        </div>
        <div class="feature-glow" [style.background]="feature.gradient"></div>
      </div>
    </div>
  </div>
</section>
